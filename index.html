    @layer tokens, base, components;

    @layer tokens {
      :root {
        /* Color — warm paper/ink with a botanical accent.
           QR colors are pinned to pure black/white for scan reliability. */
        --c-bg: #f4f1ea;
        --c-fg: #1c1a17;
        --c-fg-muted: #5a554d;
        --c-fg-subtle: #6b6559;
        --c-rule: #d8d2c4;
        --c-surface-hover: #ebe4d4;
        --c-accent: #3f5a3a;
        --c-qr-bg: #ffffff;

        /* Type — editorial serif + humanist grotesque + mono */
        --font-display: "Fraunces", ui-serif, Georgia, serif;
        --font-body: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;

        --text-xs:   clamp(0.75rem,  0.73rem + 0.10vw, 0.8125rem);
        --text-sm:   clamp(0.875rem, 0.85rem + 0.15vw, 0.9375rem);
        --text-base: clamp(1rem,     0.96rem + 0.20vw, 1.0625rem);
        --text-xl:   clamp(1.5rem,   1.38rem + 0.60vw, 1.75rem);
        --text-2xl:  clamp(2rem,     1.70rem + 1.50vw, 2.75rem);

        --leading-tight: 1.1;
        --leading-body:  1.55;

        --tracking-tight: -0.015em;
        --tracking-wide:   0.06em;
        --tracking-caps:   0.14em;

        /* Space — 4px geometric */
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.5rem;
        --space-7: 3rem;

        /* Form */
        --radius-sm: 2px;
        --rule: 1px solid var(--c-rule);

        /* Motion (reduced via @media below) */
        --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        --dur: 180ms;

        /* A11y */
        --hit: 44px;
        --focus-ring: 2px solid var(--c-accent);
        --focus-offset: 3px;

        /* Layout */
        --container: 36rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --c-bg: #14130f;
          --c-fg: #ece7d9;
          --c-fg-muted: #a6a094;
          --c-fg-subtle: #90897d;
          --c-rule: #2d2b26;
          --c-surface-hover: #1e1c17;
          --c-accent: #a2c087;
          /* QR tokens intentionally un-themed — scans need pure contrast. */
        }
      }

      @media (prefers-reduced-motion: reduce) {
        :root { --dur: 0ms; }
      }
    }

    @layer base {
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        padding: var(--space-5) var(--space-4);
        background: var(--c-bg);
        color: var(--c-fg);
        font-family: var(--font-body);
        font-size: var(--text-base);
        line-height: var(--leading-body);
        display: flex;
        justify-content: center;
        min-height: 100svh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a { color: inherit; }

      :focus-visible {
        outline: var(--focus-ring);
        outline-offset: var(--focus-offset);
        border-radius: var(--radius-sm);
      }
    }

    @layer components {
      .container {
        width: 100%;
        max-width: var(--container);
      }

      .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-5);
      }

      /* QR container — pinned light regardless of theme so phone cameras scan reliably.
         Double-rule mat: outer border + inner hairline via ::before. */
      .avatar {
        position: relative;
        width: 100%;
        max-width: 512px;
        background: var(--c-qr-bg);
        padding: var(--space-5);
        border: var(--rule);
      }

      .avatar::before {
        content: "";
        position: absolute;
        inset: var(--space-2);
        border: var(--rule);
        pointer-events: none;
      }

      .avatar img {
        width: 100%;
        height: auto;
        display: block;
        position: relative;
      }

      @media (max-width: 600px) {
        .avatar { max-width: 320px; }
      }

      /* Desktop: drop the rectangular mat frame; circular border hugs the portrait. */
      @media (min-width: 640px) and (hover: hover) and (pointer: fine) {
        .avatar {
          background: transparent;
          padding: 0;
          border-radius: 50%;
        }
        .avatar::before { display: none; }
      }

      .name {
        margin: 0;
        font-family: var(--font-display);
        font-size: var(--text-2xl);
        font-weight: 400;
        font-variation-settings: "opsz" 120, "SOFT" 30;
        line-height: var(--leading-tight);
        letter-spacing: var(--tracking-tight);
        text-align: center;
      }

      .title {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-3);
        font-size: var(--text-sm);
        font-weight: 500;
        letter-spacing: var(--tracking-caps);
        text-transform: uppercase;
        color: var(--c-fg-muted);
      }

      .title::before,
      .title::after {
        content: "";
        flex-shrink: 0;
        width: 1.5rem;
        height: 1px;
        background: var(--c-accent);
      }

      .description {
        margin: 0;
        max-width: 30rem;
        text-align: center;
        color: var(--c-fg-muted);
      }

      .links, .extras-links, .extras-expandable {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
        width: 100%;
      }

      .links { margin-top: var(--space-4); }

      .link-item {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        min-height: var(--hit);
        padding: var(--space-4) var(--space-5);
        border: var(--rule);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--c-fg);
        transition: background-color var(--dur) var(--ease),
                    border-color var(--dur) var(--ease),
                    transform var(--dur) var(--ease);
      }

      .link-item:hover,
      .link-item:focus-visible {
        background: var(--c-surface-hover);
        border-color: var(--c-fg-muted);
      }

      .link-item:active { transform: translateY(1px); }

      .link-item svg {
        width: 1.4em;
        height: 1.4em;
        flex-shrink: 0;
        color: var(--c-fg-muted);
        transition: color var(--dur) var(--ease);
      }

      .link-item:hover svg,
      .link-item:focus-visible svg {
        color: var(--c-accent);
      }

      /* Extras — hand-set botanical ornament replaces a plain divider rule */
      .extras-section {
        width: 100%;
        margin-top: var(--space-7);
      }

      .ornament {
        display: flex;
        justify-content: center;
        color: var(--c-accent);
        margin-bottom: var(--space-5);
      }

      .ornament svg { display: block; }

      .extras-heading {
        margin: 0 0 var(--space-4);
        font-size: var(--text-xs);
        font-weight: 500;
        letter-spacing: var(--tracking-caps);
        text-transform: uppercase;
        text-align: center;
        color: var(--c-fg-muted);
      }

      .extra-link-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }

      .extra-link-date {
        font-size: var(--text-xs);
        font-variant-numeric: tabular-nums;
        letter-spacing: var(--tracking-wide);
        color: var(--c-fg-subtle);
      }

      .extras-details { width: 100%; }

      .extras-summary {
        list-style: none;
        min-height: var(--hit);
        margin-top: var(--space-3);
        padding: var(--space-3) var(--space-4);
        border: var(--rule);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: center;
        font-size: var(--text-xs);
        font-weight: 500;
        letter-spacing: var(--tracking-caps);
        text-transform: uppercase;
        color: var(--c-fg-muted);
        transition: background-color var(--dur) var(--ease),
                    border-color var(--dur) var(--ease);
      }

      .extras-summary::-webkit-details-marker { display: none; }

      .extras-summary:hover,
      .extras-summary:focus-visible {
        background: var(--c-surface-hover);
        border-color: var(--c-fg-muted);
      }

      .extras-expandable { margin-top: var(--space-3); }

      .footer {
        margin-top: var(--space-7);
        text-align: center;
        font-size: var(--text-xs);
        font-variant-numeric: tabular-nums;
        letter-spacing: var(--tracking-wide);
        color: var(--c-fg-subtle);
      }
    }
        </style>
